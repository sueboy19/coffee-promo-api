name = "coffee-promo-api"
main = "src/index.ts"
compatibility_date = "2024-04-03"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8788

[[d1_databases]]
binding = "DB"
database_name = "coffee-promo-db"
database_id = ""  # 建立 D1 後填入

[triggers]
crons = ["0 6 * * *"]

[vars]
ENVIRONMENT = "development"
CORS_ORIGINS = "http://localhost:3000,http://localhost:5173,http://localhost:8787"
CPOK_711_URL = "https://cpok.tw/26184"
CPOK_FAMILYMART_URL = "https://cpok.tw/26869"

[env.production]
name = "coffee-promo-api-prod"
compatibility_flags = ["nodejs_compat"]

[env.production.vars]
ENVIRONMENT = "production"
CORS_ORIGINS = "https://free2free.pages.dev"
CPOK_711_URL = "https://cpok.tw/26184"
CPOK_FAMILYMART_URL = "https://cpok.tw/26869"

[[env.production.d1_databases]]
binding = "DB"
database_name = "coffee-promo-db"
database_id = ""  # production D1 id
